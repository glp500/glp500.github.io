<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    {% include head.html %}
  </head>
  <body class="page-{{ page.nav_key | default: page.layout | default: 'default' | slugify }}">
    <a class="skip-link" href="#main-content">Skip to content</a>
    {% include header.html %}
    <main id="main-content">
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
