{% assign profile = site.data.profile %}
<header class="site-header">
  <div class="shell site-header__inner">
    <a class="site-header__brand" href="{{ '/' | relative_url }}">
      <span class="site-header__name">{{ profile.name }}</span>
      <span class="site-header__tag">{{ profile.tagline }}</span>
    </a>

    <button class="site-header__toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
      Menu
    </button>

    <nav class="site-nav" id="site-nav" data-site-nav>
      {% for item in site.data.navigation %}
        {% assign is_active = false %}
        {% if page.nav_key == item.key %}
          {% assign is_active = true %}
        {% endif %}
        <a class="site-nav__link{% if is_active %} is-active{% endif %}" href="{{ item.url | relative_url }}">{{ item.label }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
